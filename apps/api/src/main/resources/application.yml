spring:
  application:
    name: bbs-api
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lenjoy_bbs}
    username: ${DB_USER:lenjoy}
    password: ${DB_PASSWORD:lenjoy}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:5MB}
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  packages-to-scan: com.lenjoy.bbs.controller
  paths-to-match: /api/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8080}

auth:
  jwt:
    secret: ${JWT_SECRET:lenjoy-jwt-secret-change-me-at-least-32-chars}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:72000}
  captcha:
    ttl-seconds: ${CAPTCHA_TTL_SECONDS:120}
    length: ${CAPTCHA_LENGTH:4}

admin:
  bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    email: ${ADMIN_BOOTSTRAP_EMAIL:}

wallet:
  initial-register-coins: ${INITIAL_REGISTER_COINS:100}

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:lenjoy-bbs}
    public-base-url: ${MINIO_PUBLIC_BASE_URL:http://localhost:9000/lenjoy-bbs}
    max-file-size-bytes: ${MINIO_MAX_FILE_SIZE_BYTES:5242880}
