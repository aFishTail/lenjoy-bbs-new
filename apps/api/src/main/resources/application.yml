spring:
  application:
    name: bbs-api
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lenjoy_bbs}
    username: ${DB_USER:lenjoy}
    password: ${DB_PASSWORD:lenjoy}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  packages-to-scan: com.lenjoy.bbs.controller
  paths-to-match: /api/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8080}

auth:
  jwt:
    secret: ${JWT_SECRET:lenjoy-jwt-secret-change-me-at-least-32-chars}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:7200}
  captcha:
    ttl-seconds: ${CAPTCHA_TTL_SECONDS:120}
    length: ${CAPTCHA_LENGTH:4}
