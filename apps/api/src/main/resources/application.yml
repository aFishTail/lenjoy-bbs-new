spring:
  application:
    name: bbs-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lenjoy_bbs}
    username: ${DB_USER:lenjoy}
    password: ${DB_PASSWORD:lenjoy}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${SERVER_PORT:8080}
