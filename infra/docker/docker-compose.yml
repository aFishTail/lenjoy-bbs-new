version: "3.9"

services:
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - lenjoy-net

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/lenjoy_bbs
      DB_USER: lenjoy
      DB_PASSWORD: lenjoy
      SERVER_PORT: 8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lenjoy-bbs
      MINIO_PUBLIC_BASE_URL: http://localhost:9000/lenjoy-bbs
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - lenjoy-net

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lenjoy
      POSTGRES_PASSWORD: lenjoy
      POSTGRES_DB: lenjoy_bbs
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lenjoy-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - lenjoy-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - lenjoy-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/lenjoy-bbs &&
      mc anonymous set download local/lenjoy-bbs
      "
    networks:
      - lenjoy-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - lenjoy-net

networks:
  lenjoy-net:

volumes:
  postgres-data:
  minio-data:
