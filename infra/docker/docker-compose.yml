version: "3.9"

services:
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - lenjoy-net

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/lenjoy_bbs
      DB_USER: lenjoy
      DB_PASSWORD: lenjoy
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    networks:
      - lenjoy-net

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lenjoy
      POSTGRES_PASSWORD: lenjoy
      POSTGRES_DB: lenjoy_bbs
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lenjoy-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - lenjoy-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - lenjoy-net

networks:
  lenjoy-net:

volumes:
  postgres-data:
