services:
  postgres:
    image: postgres:16
    container_name: lenjoy-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-lenjoy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lenjoy}
      POSTGRES_DB: ${DB_NAME:-lenjoy_bbs}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lenjoy-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    container_name: lenjoy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-dev-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: lenjoy-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-lenjoy-bbs} &&
      mc anonymous set download local/${MINIO_BUCKET:-lenjoy-bbs}
      "

volumes:
  postgres-dev-data:
  minio-dev-data:
